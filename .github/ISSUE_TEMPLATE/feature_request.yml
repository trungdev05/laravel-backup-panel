name: Feature request
description: Propose a broadly useful improvement.
title: "[Feature]: "
labels:
  - "type: feature"
  - "status: needs-triage"
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the user problem and who encounters it.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the public behavior and package boundary.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: true
