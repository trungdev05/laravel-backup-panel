name: CI

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  compatibility:
    name: Compatibility · Laravel ${{ matrix.laravel }} · PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.3'
            laravel: '^12.40'
            testbench: '^10.0'
          - php: '8.4'
            laravel: '^12.40'
            testbench: '^10.0'
          - php: '8.5'
            laravel: '^12.40'
            testbench: '^10.0'
          - php: '8.3'
            laravel: '^13.0'
            testbench: '^11.0'
          - php: '8.4'
            laravel: '^13.0'
            testbench: '^11.0'
          - php: '8.5'
            laravel: '^13.0'
            testbench: '^11.0'
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none
          cache: composer
      - name: Install matrix dependencies
        run: >-
          composer update --with-all-dependencies --no-interaction --prefer-dist
          --with "laravel/framework:${{ matrix.laravel }}"
          --with "orchestra/testbench:${{ matrix.testbench }}"
      - name: Run tests
        run: composer test

  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none
          cache: composer
      - name: Install Laravel 13 dependencies
        run: >-
          composer update --with-all-dependencies --no-interaction --prefer-dist
          --with "laravel/framework:^13.0"
          --with "orchestra/testbench:^11.0"
      - name: Validate Composer metadata
        run: composer validate --strict
      - name: Run tests
        run: composer test
      - name: Run static analysis
        run: composer analyse
      - name: Verify Rector
        run: composer rector:test
      - name: Verify code style
        run: composer format:test

  required:
    name: Required checks
    if: always()
    needs:
      - compatibility
      - quality
    runs-on: ubuntu-latest
    steps:
      - name: Confirm all required jobs passed
        env:
          COMPATIBILITY_RESULT: ${{ needs.compatibility.result }}
          QUALITY_RESULT: ${{ needs.quality.result }}
        run: test "$COMPATIBILITY_RESULT" = success && test "$QUALITY_RESULT" = success
