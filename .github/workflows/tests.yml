name: Tests

on:
  push:
  pull_request:

jobs:
  tests:
    name: Laravel ${{ matrix.laravel }} / PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.3'
            laravel: '^12.40'
            testbench: '^10.0'
          - php: '8.3'
            laravel: '^13.0'
            testbench: '^11.0'

    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
      - name: Install matrix dependencies
        run: >-
          composer update --with-all-dependencies --no-interaction --prefer-dist
          --with "laravel/framework:${{ matrix.laravel }}"
          --with "orchestra/testbench:${{ matrix.testbench }}"
      - name: Run tests
        run: composer test
      - name: Run static analysis
        run: composer analyse
      - name: Verify Rector
        run: composer rector:test
